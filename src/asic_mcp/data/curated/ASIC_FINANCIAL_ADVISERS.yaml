    TAS: TAS
    NT: NT
    ACT: ACT
  overall_registration_status:
    current: Current
    ceased: Ceased
    Current: Current
    Ceased: Ceased
  adviser_role_status:
    current: Current
    ceased: Ceased
    Current: Current
    Ceased: Ceased
